<head>
    First Test for this concept.
</head>

<script>
    class App extends React.Component {
  constructor(props) {
    super(props);
    this.state = {
      breakLength: 5,
      sessionLength: 25,
      remainingTime: "25:00",
      running: false,
      interval: null,
      timeout: null,
      currentIsSession: true
    }
    this.breakDecrement = this.breakDecrement.bind(this);
    this.breakIncrement = this.breakIncrement.bind(this);
    this.sessionDecrement = this.sessionDecrement.bind(this);
    this.sessionIncrement = this.sessionIncrement.bind(this);
    this.startStopButton = this.startStopButton.bind(this);
    this.startStopTimer = this.startStopTimer.bind(this);
    this.timeDown = this.timeDown.bind(this);
    this.stopInterval = this.stopInterval.bind(this);
    this.setRemainingTime = this.setRemainingTime.bind(this);
    this.reset = this.reset.bind(this);
  }
  
  breakDecrement() {
    if(this.state.breakLength > 1) {
      this.setState({breakLength: this.state.breakLength - 1});
    }
  }
  
  breakIncrement() {
    if(this.state.breakLength < 60) {
      this.setState({breakLength: this.state.breakLength + 1});
    }
  }
  
  sessionDecrement() {
    if(this.state.sessionLength > 1) {
      let rem = (this.state.sessionLength - 1).toString() + ":00";
      this.state.sessionLength - 1 > 9 ? rem = rem : rem = "0" + rem;
      this.setState({sessionLength: this.state.sessionLength - 1,
                  remainingTime: rem});
    }
  }
  
  sessionIncrement() {
    if(this.state.sessionLength < 60) {
      let rem = (this.state.sessionLength + 1).toString() + ":00";
      this.state.sessionLength + 1 > 9 ? rem = rem : rem = "0" + rem;
      this.setState({sessionLength: this.state.sessionLength + 1,
                  remainingTime: rem});
    }
  }
  
  startStopButton() {
    if(this.state.running) {
    this.setState({running: false}, this.startStopTimer);      
    } else {
    this.setState({running: true}, this.startStopTimer);      
    } 
  }
  
  startStopTimer() {
    if(this.state.running) {
      let timespan = this.state.remainingTime.split(":");
      timespan[0] = parseInt(timespan[0])*60000;
      timespan[1] = parseInt(timespan[1])*1000;
      timespan[0] = timespan[0] + timespan[1];
      let tmpInt = setInterval(this.timeDown, 1000);
      let tmpTime = setTimeout(this.stopInterval, timespan[0] + 500);
      this.setState({interval: tmpInt});
      this.setState({timeout: tmpTime});
    } else {
      clearInterval(this.state.interval);
      clearTimeout(this.state.timeout);
    }
  }
  
  setRemainingTime(bool = false) {
    if(!bool) {
      let rem = (this.state.sessionLength).toString() + ":00";
      parseInt(rem) > 9 ? rem = rem : rem = "0" + rem;
      this.setState({remainingTime: rem});
    } else {
      let rem = (this.state.breakLength).toString() + ":00";
      parseInt(rem) > 9 ? rem = rem : rem = "0" + rem;
      this.setState({remainingTime: rem});
    }
  }
  
  stopInterval() {
    clearInterval(this.state.interval);
    this.setState({currentIsSession: !this.state.currentIsSession}, this.setRemainingTime(this.state.currentIsSession));
    this.startStopTimer();
    document.getElementById("beep").play();
  }
  
  timeDown() {
    let origin = this.state.remainingTime;
    let array = origin.split(":");
    if(array[1] == "00") {
      array[1] = "59";
      array[0] = (parseInt(array[0]) - 1).toString();
      if(parseInt(array[0])<10) {
        array[0] = "0" + array[0];
      }
      origin = array[0] + ":" + array[1];
    } else {
      array[1] = (parseInt(array[1]) - 1).toString();
      if(parseInt(array[1])<10) {
        array[1] = "0" + array[1];
      }
      origin = array[0] + ":" + array[1];
    }
    this.setState({remainingTime: origin});
  }
  
  reset() {
    clearInterval(this.state.interval);
    this.setState({running: false, currentIsSession: true, breakLength: 5, sessionLength: 25}, this.setRemainingTime);
    document.getElementById("beep").pause();
    document.getElementById("beep").currentTime = 0;
  }
  
  render() {
    return (
      <div>
        <p id="session-label">Session length</p>
        <p id="break-label">Break length</p>
        <p id="session-length">{this.state.sessionLength}</p>
        <p id="break-length">{this.state.breakLength}</p>
        
        <button id="break-decrement" onClick={this.breakDecrement}>break - 1</button>
        <button id="break-increment" onClick={this.breakIncrement}>break + 1</button>
        <button id="session-decrement" onClick={this.sessionDecrement}>session - 1</button>
        <button id="session-increment" onClick={this.sessionIncrement}>session + 1</button>
        
        <h2 id="timer-label">{this.state.currentIsSession ? "Session" : "Break"}</h2>
        <h3 id="time-left">{this.state.remainingTime}</h3>
        <button id="start_stop" onClick={this.startStopButton}>start/stop</button>
        <button id="reset" onClick={this.reset}>reset</button>
        <audio id="beep" src="https://s3.amazonaws.com/freecodecamp/drums/Chord_2.mp3" />
      </div>
    )
  }
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
