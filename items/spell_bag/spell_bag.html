<!DOCTYPE html>
<html>
<body>
<h1>Bag of Scrambled Spells</h1>

<p>
    This item allows its wearer to cast new spells by creating runes of variying quality, that can be used to spell words.
</p>

<button type="button" onclick="rolld4()">Roll one d4.</button>

<p id="writable">Put results here.</p>

<script>
function rolld4() {
    let result = Math.floor(Math.random() * 4) + 1;
    document.getElementById("writable").innerHTML = "You rolled: " + result + "!";
}
</script>

</body>
